workflow: family_cascade_bridge
version: 1
description: |
  Cascade-bridge analytical family. Triggered when the user asks for a
  cascade analysis with bridge perimeter. Precedence rule:
  cascade_bridge_on_cascade_intent (precedence position 2).

context_schema:
  input:
    - { name: signals,        type: object }
    - { name: scope_context,  type: object }
    - { name: role_family,    type: string }
  output_by_terminal:
    matched:
      - { name: family_id,             type: string }
      - { name: analysis_type,         type: string }
      - { name: comparison_mode,       type: string }
      - { name: expected_answer_shape, type: string }
    not_matched:
      - { name: family_id,             type: string }
    needs_scope_clarification:
      - { name: family_id,             type: string }
    needs_semantic_clarification:
      - { name: family_id,             type: string }
      - { name: ambiguity_kind,        type: string }

initial_state: evaluating

states:
  - { name: evaluating,                   description: "Evaluating cascade entry, scope, and ambiguity guards.", is_final: false }
  - { name: matched,                      description: "Cascade-bridge family resolved, output spec ready.", is_final: true }
  - { name: not_matched,                  description: "Entry guards not satisfied.", is_final: true }
  - { name: needs_scope_clarification,    description: "scope_missing fired.", is_final: true }
  - { name: needs_semantic_clarification, description: "bridge_perimeter_ambiguous fired.", is_final: true }

events:
  - { name: entry_failed,           description: "Cascade entry guards not satisfied." }
  - { name: scope_missing_signal,   description: "scope_missing guard true." }
  - { name: semantic_ambiguity,     description: "bridge_perimeter_ambiguous fired." }
  - { name: ready,                  description: "All ready guards true; family resolved." }

guards:
  - { name: cascade_entry_guards,    description: "analysis_cascade, bridge_shape_explicit." }
  - { name: scope_missing,           description: "Scope cannot be resolved from signals + scope_context." }
  - { name: bridge_perimeter_ambiguous, description: "Bridge perimeter cannot be uniquely identified." }
  - { name: cascade_ready_guards,    description: "All cascade ready guards true." }

transitions:
  - { from: evaluating, to: not_matched,                  event: entry_failed,         guard: cascade_entry_guards }
  - { from: evaluating, to: needs_scope_clarification,    event: scope_missing_signal, guard: scope_missing }
  - { from: evaluating, to: needs_semantic_clarification, event: semantic_ambiguity,   guard: bridge_perimeter_ambiguous }
  - { from: evaluating, to: matched,                      event: ready,                guard: cascade_ready_guards }

metadata:
  source: pipeline-contract/family-state-rules.ts (cascade_bridge record)
  precedence_position: 2
