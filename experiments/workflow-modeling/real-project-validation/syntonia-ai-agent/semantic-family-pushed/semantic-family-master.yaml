workflow: semantic_family_master
version: 1
description: |
  Master FSM that orchestrates the seven family workflows in the
  precedence order declared in the Syntonia source. Each evaluating_*
  state synchronously invokes the corresponding family workflow; the
  child's terminal_state determines the next state of the master.
  Precedence position in evaluating_* state matches FAMILY_PRECEDENCE_
  RULE_SEQUENCE in family-state-rules.ts.

  Semantics:
  - "matched" terminal of any family => master jumps to family_resolved
    (success terminal).
  - "needs_scope_clarification" / "needs_semantic_clarification" => master
    jumps to the corresponding clarification terminal.
  - "blocked" of family_gating_or_clarification => master jumps to
    blocked terminal (hard block).
  - "not_matched" => master cascades to the next family in precedence
    order. If all seven exhaust without a match, the master ends in
    all_families_exhausted (defensive fallback; in practice
    family_single_kpi_snapshot always matches as the lowest fallback).

  This is the "pushed" modeling exercise: forcing the rule engine into
  a sequence of synchronous invocations to see how far POM round 2
  primitives carry.

context_schema:
  input:
    - { name: signals,        type: object, description: "QuestionSignals payload." }
    - { name: scope_context,  type: object, description: "Profile + policy scope context." }
    - { name: role_family,    type: string }
  output_by_terminal:
    family_resolved:
      - { name: family_id,             type: string }
      - { name: analysis_type,         type: string }
      - { name: comparison_mode,       type: string }
      - { name: expected_answer_shape, type: string }
    needs_scope_clarification:
      - { name: family_id,             type: string }
    needs_semantic_clarification:
      - { name: family_id,             type: string }
      - { name: ambiguity_kind,        type: string }
    blocked:
      - { name: family_id,             type: string }
      - { name: block_reason,          type: string }
    all_families_exhausted:
      - { name: diagnostic_note,       type: string }

initial_state: turn_received

states:
  - { name: turn_received, description: "Turn received, classification not started.", is_final: false }

  - name: evaluating_gating_or_clarification
    description: |
      Position 1 in the precedence sequence. Terminator family;
      forwards a hard block immediately to the master's blocked terminal.
    is_final: false
    invoke:
      workflow: family-gating-or-clarification.yaml
      input:
        signals: signals
        scope_context: scope_context
        role_family: role_family
      on_completion:
        - { terminal_state: matched,     next_event: gating_matched }
        - { terminal_state: blocked,     next_event: gating_blocked }
        - { terminal_state: not_matched, next_event: try_cascade_bridge }

  - name: evaluating_cascade_bridge
    description: "Position 2: cascade-bridge analytical family."
    is_final: false
    invoke:
      workflow: family-cascade-bridge.yaml
      input:
        signals: signals
        scope_context: scope_context
        role_family: role_family
      on_completion:
        - { terminal_state: matched,                      next_event: family_matched }
        - { terminal_state: needs_scope_clarification,    next_event: family_needs_scope }
        - { terminal_state: needs_semantic_clarification, next_event: family_needs_semantic }
        - { terminal_state: not_matched,                  next_event: try_yoy_driver_diagnosis }

  - name: evaluating_yoy_driver_diagnosis
    description: "Position 3: yoy-driver-diagnosis family."
    is_final: false
    invoke:
      workflow: family-yoy-driver-diagnosis.yaml
      input:
        signals: signals
        scope_context: scope_context
        role_family: role_family
      on_completion:
        - { terminal_state: matched,                      next_event: family_matched }
        - { terminal_state: needs_scope_clarification,    next_event: family_needs_scope }
        - { terminal_state: needs_semantic_clarification, next_event: family_needs_semantic }
        - { terminal_state: not_matched,                  next_event: try_rolling_trend_tradeoff }

  - name: evaluating_rolling_trend_tradeoff
    description: "Position 4: rolling-trend-tradeoff family."
    is_final: false
    invoke:
      workflow: family-rolling-trend-tradeoff.yaml
      input:
        signals: signals
        scope_context: scope_context
        role_family: role_family
      on_completion:
        - { terminal_state: matched,                      next_event: family_matched }
        - { terminal_state: needs_scope_clarification,    next_event: family_needs_scope }
        - { terminal_state: needs_semantic_clarification, next_event: family_needs_semantic }
        - { terminal_state: not_matched,                  next_event: try_benchmark_vs_media }

  - name: evaluating_benchmark_vs_media
    description: "Position 5: benchmark-vs-media family."
    is_final: false
    invoke:
      workflow: family-benchmark-vs-media.yaml
      input:
        signals: signals
        scope_context: scope_context
        role_family: role_family
      on_completion:
        - { terminal_state: matched,                      next_event: family_matched }
        - { terminal_state: needs_scope_clarification,    next_event: family_needs_scope }
        - { terminal_state: needs_semantic_clarification, next_event: family_needs_semantic }
        - { terminal_state: not_matched,                  next_event: try_ratio_threshold_ranking }

  - name: evaluating_ratio_threshold_ranking
    description: "Position 6: ratio-threshold-ranking family."
    is_final: false
    invoke:
      workflow: family-ratio-threshold-ranking.yaml
      input:
        signals: signals
        scope_context: scope_context
        role_family: role_family
      on_completion:
        - { terminal_state: matched,                      next_event: family_matched }
        - { terminal_state: needs_scope_clarification,    next_event: family_needs_scope }
        - { terminal_state: needs_semantic_clarification, next_event: family_needs_semantic }
        - { terminal_state: not_matched,                  next_event: try_single_kpi_snapshot }

  - name: evaluating_single_kpi_snapshot
    description: "Position 7: single-kpi-snapshot fallback family."
    is_final: false
    invoke:
      workflow: family-single-kpi-snapshot.yaml
      input:
        signals: signals
        scope_context: scope_context
        role_family: role_family
      on_completion:
        - { terminal_state: matched,                      next_event: family_matched }
        - { terminal_state: needs_scope_clarification,    next_event: family_needs_scope }
        - { terminal_state: needs_semantic_clarification, next_event: family_needs_semantic }
        - { terminal_state: not_matched,                  next_event: cascade_exhausted }

  # Terminals
  - { name: family_resolved,             description: "A family matched; output spec available.", is_final: true }
  - { name: needs_scope_clarification,   description: "Some family asked for scope clarification.", is_final: true }
  - { name: needs_semantic_clarification, description: "Some family asked for semantic clarification.", is_final: true }
  - { name: blocked,                     description: "Hard block from the gating family.", is_final: true }
  - { name: all_families_exhausted,      description: "Defensive: no family matched even as fallback.", is_final: true }

events:
  - { name: start_classification,        description: "Begin family classification cascade." }

  # Resolutions
  - { name: gating_matched,              description: "Gating terminator fired; treat as resolved." }
  - { name: gating_blocked,              description: "Hard block from gating family." }
  - { name: family_matched,              description: "An analytical family matched." }
  - { name: family_needs_scope,          description: "A family signaled needs_scope_clarification." }
  - { name: family_needs_semantic,       description: "A family signaled needs_semantic_clarification." }

  # Cascade events (one per "try next family")
  - { name: try_cascade_bridge,          description: "Gating did not match; try cascade-bridge next." }
  - { name: try_yoy_driver_diagnosis,    description: "Cascade-bridge did not match; try yoy next." }
  - { name: try_rolling_trend_tradeoff,  description: "Yoy did not match; try rolling-trend next." }
  - { name: try_benchmark_vs_media,      description: "Rolling-trend did not match; try benchmark next." }
  - { name: try_ratio_threshold_ranking, description: "Benchmark did not match; try ratio-threshold next." }
  - { name: try_single_kpi_snapshot,     description: "Ratio-threshold did not match; try snapshot fallback next." }
  - { name: cascade_exhausted,           description: "Even snapshot fallback did not match. Defensive." }

transitions:
  - { from: turn_received, to: evaluating_gating_or_clarification, event: start_classification }

  # From gating
  - { from: evaluating_gating_or_clarification, to: family_resolved,                event: gating_matched }
  - { from: evaluating_gating_or_clarification, to: blocked,                        event: gating_blocked }
  - { from: evaluating_gating_or_clarification, to: evaluating_cascade_bridge,      event: try_cascade_bridge }

  # From cascade_bridge
  - { from: evaluating_cascade_bridge, to: family_resolved,                event: family_matched }
  - { from: evaluating_cascade_bridge, to: needs_scope_clarification,      event: family_needs_scope }
  - { from: evaluating_cascade_bridge, to: needs_semantic_clarification,   event: family_needs_semantic }
  - { from: evaluating_cascade_bridge, to: evaluating_yoy_driver_diagnosis, event: try_yoy_driver_diagnosis }

  # From yoy
  - { from: evaluating_yoy_driver_diagnosis, to: family_resolved,                event: family_matched }
  - { from: evaluating_yoy_driver_diagnosis, to: needs_scope_clarification,      event: family_needs_scope }
  - { from: evaluating_yoy_driver_diagnosis, to: needs_semantic_clarification,   event: family_needs_semantic }
  - { from: evaluating_yoy_driver_diagnosis, to: evaluating_rolling_trend_tradeoff, event: try_rolling_trend_tradeoff }

  # From rolling_trend
  - { from: evaluating_rolling_trend_tradeoff, to: family_resolved,                event: family_matched }
  - { from: evaluating_rolling_trend_tradeoff, to: needs_scope_clarification,      event: family_needs_scope }
  - { from: evaluating_rolling_trend_tradeoff, to: needs_semantic_clarification,   event: family_needs_semantic }
  - { from: evaluating_rolling_trend_tradeoff, to: evaluating_benchmark_vs_media,  event: try_benchmark_vs_media }

  # From benchmark
  - { from: evaluating_benchmark_vs_media, to: family_resolved,                event: family_matched }
  - { from: evaluating_benchmark_vs_media, to: needs_scope_clarification,      event: family_needs_scope }
  - { from: evaluating_benchmark_vs_media, to: needs_semantic_clarification,   event: family_needs_semantic }
  - { from: evaluating_benchmark_vs_media, to: evaluating_ratio_threshold_ranking, event: try_ratio_threshold_ranking }

  # From ratio_threshold
  - { from: evaluating_ratio_threshold_ranking, to: family_resolved,                event: family_matched }
  - { from: evaluating_ratio_threshold_ranking, to: needs_scope_clarification,      event: family_needs_scope }
  - { from: evaluating_ratio_threshold_ranking, to: needs_semantic_clarification,   event: family_needs_semantic }
  - { from: evaluating_ratio_threshold_ranking, to: evaluating_single_kpi_snapshot,  event: try_single_kpi_snapshot }

  # From snapshot (fallback)
  - { from: evaluating_single_kpi_snapshot, to: family_resolved,                event: family_matched }
  - { from: evaluating_single_kpi_snapshot, to: needs_scope_clarification,      event: family_needs_scope }
  - { from: evaluating_single_kpi_snapshot, to: needs_semantic_clarification,   event: family_needs_semantic }
  - { from: evaluating_single_kpi_snapshot, to: all_families_exhausted,         event: cascade_exhausted }

invariants:
  - description: |
      Each evaluating_* state has exactly four on_completion handlers
      mirroring the four canonical family terminals (matched,
      needs_scope_*, needs_semantic_*, not_matched). The gating family
      adds a fifth (blocked); the snapshot fallback does not need
      "needs_*" different handling but follows the same shape for
      uniformity.
  - description: |
      The cascade ordering encodes the FAMILY_PRECEDENCE_RULE_SEQUENCE
      from family-state-rules.ts as the order of evaluating_* states.
      Reordering states reorders precedence; this is the master's only
      way to express precedence, and it is faithful only when precedence
      can be linearized (a strong assumption — see FINDINGS.md).
  - description: |
      A family_matched event from any analytical family ends the
      cascade. The master does not collect or merge multiple positive
      matches — there is exactly one winner, the first that matches.

metadata:
  owner: Syntonia ai-agent canonical server
  source_file: pipeline-contract/family-state-rules.ts
  tags: [real-project, validation, pushed-modeling, family-dispatcher, multi-invoke]
  precedence_sequence_modeled: 7
  precedence_sequence_in_source: 19

  pushed_modeling_notes:
    - |
      This master uses SEVEN consecutive state-invokes on seven
      different child workflows. Round 2 schema accepts this without
      modification. The pattern is essentially a "sequential dispatcher"
      and is a legitimate use of state-invoke at scale.

    - |
      Faithfulness gained vs the flat forced-fit model:
      - each family is now a first-class autonomous workflow with its
        own state graph, guards, and context_schema;
      - the precedence order is explicitly encoded by the sequence of
        evaluating_* states in the master;
      - each family declares its own output_by_terminal payload
        (analysis_type, comparison_mode, expected_answer_shape) instead
        of collapsing everything into one parent terminal;
      - the "control mode" distinction (terminator vs analytical) is
        respected: family_gating_or_clarification has a "blocked"
        terminal absent from the others.

    - |
      Faithfulness still missing (the limits the source has and POM
      still cannot express):
      - 19 precedence rules in the source are not all linear;
        some (e.g., yoy_driver_diagnosis_on_consecutive_years) depend
        on a CONJUNCTION of cues that crosses two candidate families.
        The master linearizes precedence, so it implicitly assumes the
        sequence is a total order — true only by construction.
      - the 40 guard names are still nominal; the actual evaluation of
        each guard against signals + scope_context lives in target
        code (this is consistent with POM's "documentation, not
        runtime" stance, so it is a design feature, not a defect).
      - the source evaluates all 13 families concurrently and picks
        the dominant one via precedence rules. The master makes the
        same selection sequentially. The difference is observability:
        the source can report "all candidates considered" while the
        master can only report "first match in declared order".
      - precedence rules that say "if family A matched first but family
        B also matched, prefer B" cannot be expressed in this model.
        The first match wins, full stop.
