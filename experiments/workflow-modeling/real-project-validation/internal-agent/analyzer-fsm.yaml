# POM modeling of the internal AI agent Analyzer FSM.
#
# Source: the internal AI agent source tree/pipeline/analyzer/analyzer-fsm.ts
#
# Mapping notes:
# - The 13 ANALYZER_STEP_TRANSITION_RULES names become 13 active states.
# - The 7 AnalyzerStopExitId values become 7 terminal states.
# - The linear progression follows ANALYZER_TRANSITION_RULES.
# - The retry loops (parse_and_validate -> llm_call, coherence_validation
#   -> llm_call) are modeled as cyclic transitions; the bounded retry
#   count (MAX_LLM_ATTEMPTS = 3, maxTransitions = 36) is declared as an
#   open point because POM has no bounded-loop-with-counter primitive.
# - The "STOP direct" transitions (deterministic_reply_check and
#   pending_scope_resolution returning kind:"stop") are modeled as
#   direct transitions to the corresponding stop-exit states.

workflow: analyzer_fsm
version: 1
description: |
  internal AI agent analyzer. 13 internal steps that transform a user
  question into an AnalyzerOutput plus a routing signal. Two short-
  circuit paths (deterministic reply, pending scope) skip the LLM. The
  LLM call has bounded retry on parse / coherence errors.

context_schema:
  input:
    - { name: question,        type: string }
    - { name: tenant_id,       type: string }
    - { name: role_family,     type: string }
  output_by_terminal:
    completed:
      - { name: analyzer_output, type: object, description: "Validated AnalyzerOutput payload." }
      - { name: routing,         type: string, description: "full_pipeline | direct_output | stop." }
    deterministic_reply_resolved:
      - { name: analyzer_output, type: object }
      - { name: routing,         type: string, description: "Usually direct_output or stop." }
    pending_scope_resolved:
      - { name: analyzer_output, type: object }
      - { name: routing,         type: string }
    llm_failure:
      - { name: fallback_reason,           type: string }
      - { name: fallback_suggested_question, type: string }
    parse_exhausted:
      - { name: fallback_reason,           type: string }
      - { name: fallback_suggested_question, type: string }
    schema_exhausted:
      - { name: fallback_reason,           type: string }
      - { name: fallback_suggested_question, type: string }
    coherence_exhausted:
      - { name: fallback_reason,           type: string }
      - { name: fallback_suggested_question, type: string }

initial_state: signal_extraction

states:
  - { name: signal_extraction,         description: "Builds typed signals from the question.", is_final: false }
  - { name: ml_family_classification,  description: "Applies the ML family-prior hint.", is_final: false }
  - { name: deterministic_reply_check, description: "Short-circuit: known deterministic reply?", is_final: false }
  - { name: contextual_followup_check, description: "Short-circuit: contextual follow-up?", is_final: false }
  - { name: pending_scope_resolution,  description: "Short-circuit: resolvable without the LLM?", is_final: false }
  - { name: llm_call,                  description: "Boundary call to the analyzer LLM.", is_final: false }
  - { name: parse_and_validate,        description: "Parses the LLM JSON and runs schema checks.", is_final: false }
  - { name: signal_merge,              description: "Merges LLM draft with question signals.", is_final: false }
  - { name: scope_resolution,          description: "Applies profile, policy, output spec.", is_final: false }
  - { name: deterministic_repairs,     description: "Deterministic repairs on the resolved output.", is_final: false }
  - { name: entity_grounding,          description: "Grounds entities against the domain.", is_final: false }
  - name: family_enforcement
    description: |
      Synchronously invokes the clean-family-repair sub-FSM (clean-family-
      repair-fsm.yaml). The sub-FSM iterates up to MAX_FAMILY_REPAIR_
      ATTEMPTS = 3 times to resolve a coherent family and produce a
      repaired AnalyzerOutput. The five sub-FSM terminals all map to the
      single parent event family_enforced — the analyzer's own state
      graph does not branch on the repair outcome here; the outcome is
      consumed downstream (by coherence_validation and by the operational
      orchestrator).
    is_final: false
    invoke:
      workflow: clean-family-repair-fsm.yaml
      input:
        question: question
        initial_output: parsed_output
        semantic_hints: semantic_hints
        question_signals: question_signals
        ctx: ctx
      on_completion:
        - { terminal_state: family_ready,                 next_event: family_enforced }
        - { terminal_state: needs_scope_clarification,    next_event: family_enforced }
        - { terminal_state: needs_semantic_clarification, next_event: family_enforced }
        - { terminal_state: blocked,                      next_event: family_enforced }
        - { terminal_state: exhausted,                    next_event: family_enforced }
  - { name: coherence_validation,      description: "Final coherence check against the rules.", is_final: false }

  # Terminal stop-exits
  - { name: completed,                     description: "Successful analyzer turn.", is_final: true }
  - { name: deterministic_reply_resolved,  description: "Returned a deterministic reply, LLM skipped.", is_final: true }
  - { name: pending_scope_resolved,        description: "Resolved the pending scope without the LLM.", is_final: true }
  - { name: llm_failure,                   description: "LLM call failed (network/timeout).", is_final: true }
  - { name: parse_exhausted,               description: "Parse retries exhausted MAX_LLM_ATTEMPTS.", is_final: true }
  - { name: schema_exhausted,              description: "Schema-error retries exhausted.", is_final: true }
  - { name: coherence_exhausted,           description: "Coherence retries exhausted.", is_final: true }

events:
  # Linear progression
  - { name: signals_extracted,       description: "Done with signal extraction." }
  - { name: ml_hint_applied,         description: "ML classifier hint merged." }
  - { name: deterministic_check_done, description: "No deterministic reply, proceed." }
  - { name: followup_check_done,     description: "No contextual followup, proceed." }
  - { name: pending_scope_proceeded, description: "Pending scope cannot be resolved here, call LLM." }
  - { name: llm_responded,           description: "LLM returned a raw text." }
  - { name: parse_ok,                description: "Parse and schema validation succeeded." }
  - { name: signals_merged,          description: "Draft merged with signals." }
  - { name: scope_applied,           description: "Scope resolution applied." }
  - { name: repairs_applied,         description: "Deterministic repairs applied." }
  - { name: entities_grounded,       description: "Entities grounded against domain." }
  - { name: family_enforced,         description: "Family-state rules applied to output." }
  - { name: coherence_ok,            description: "Final coherence check passed." }

  # Short-circuit (immediate STOP from a step)
  - { name: deterministic_reply_found, description: "Step returns kind:stop with a deterministic reply." }
  - { name: pending_scope_resolved_directly, description: "Step returns kind:stop without LLM." }

  # Retry events
  - { name: parse_retry,             description: "Parse or schema error, retry the LLM call." }
  - { name: coherence_retry,         description: "Coherence error, retry the LLM call." }

  # Exhaustion events (loop guard fires)
  - { name: llm_call_failed,         description: "LLM call failed irrecoverably (network/timeout)." }
  - { name: parse_attempts_exhausted, description: "MAX_LLM_ATTEMPTS reached on parse failure." }
  - { name: schema_attempts_exhausted, description: "MAX_LLM_ATTEMPTS reached on schema failure." }
  - { name: coherence_attempts_exhausted, description: "MAX_LLM_ATTEMPTS reached on coherence failure." }

transitions:
  # Linear spine
  - { from: signal_extraction,         to: ml_family_classification,  event: signals_extracted }
  - { from: ml_family_classification,  to: deterministic_reply_check, event: ml_hint_applied }
  - { from: deterministic_reply_check, to: contextual_followup_check, event: deterministic_check_done }
  - { from: contextual_followup_check, to: pending_scope_resolution,  event: followup_check_done }
  - { from: pending_scope_resolution,  to: llm_call,                  event: pending_scope_proceeded }
  - { from: llm_call,                  to: parse_and_validate,        event: llm_responded }
  - { from: parse_and_validate,        to: signal_merge,              event: parse_ok }
  - { from: signal_merge,              to: scope_resolution,          event: signals_merged }
  - { from: scope_resolution,          to: deterministic_repairs,     event: scope_applied }
  - { from: deterministic_repairs,     to: entity_grounding,          event: repairs_applied }
  - { from: entity_grounding,          to: family_enforcement,        event: entities_grounded }
  - { from: family_enforcement,        to: coherence_validation,      event: family_enforced }
  - { from: coherence_validation,      to: completed,                 event: coherence_ok }

  # Short-circuit transitions (kind:stop returned from a step)
  - { from: deterministic_reply_check, to: deterministic_reply_resolved, event: deterministic_reply_found }
  - { from: pending_scope_resolution,  to: pending_scope_resolved,    event: pending_scope_resolved_directly }

  # Retry loops (cyclic transitions)
  - from: parse_and_validate
    to: llm_call
    event: parse_retry
    description: |
      Parse or schema error: the step returns { kind: "next", nextStep:
      "llm_call" }. POM accepts cyclic transitions; the bounded budget
      (MAX_LLM_ATTEMPTS = 3) is enforced by target code, not the schema.
      See open_points.

  - from: coherence_validation
    to: llm_call
    event: coherence_retry
    description: |
      Coherence error: same retry mechanism, different cause.

  # Exhaustion exits
  - { from: llm_call,             to: llm_failure,         event: llm_call_failed }
  - { from: parse_and_validate,   to: parse_exhausted,     event: parse_attempts_exhausted }
  - { from: parse_and_validate,   to: schema_exhausted,    event: schema_attempts_exhausted }
  - { from: coherence_validation, to: coherence_exhausted, event: coherence_attempts_exhausted }

invariants:
  - description: |
      Each retry transition (parse_retry, coherence_retry) is bounded by
      MAX_LLM_ATTEMPTS = 3 in target code. The POM model declares the
      cycle structurally but does not enforce the bound.
  - description: |
      The two short-circuit exits (deterministic_reply_resolved,
      pending_scope_resolved) happen BEFORE the LLM call. They are the
      only legitimate ways to reach a terminal without llm_call having
      ever fired.
  - description: |
      coherence_validation never proceeds linearly without success: the
      ANALYZER_TRANSITION_RULES declares no nextStep for it. In practice
      the step returns either kind:stop (coherence_ok -> completed) or
      kind:next with nextStep llm_call (coherence_retry).

metadata:
  owner: internal AI agent canonical server
  source_file: pipeline/analyzer/analyzer-fsm.ts
  tags: [real-project, validation, llm-boundary, bounded-retry]

  open_points:
    - |
      Bounded loop with retry counter. MAX_LLM_ATTEMPTS = 3 in
      analyzer-fsm.ts:354. The POM model expresses the cycle structure
      (parse_retry, coherence_retry transitions) but cannot express the
      bound. The target code uses a loop guard with maxVisitsPerStep = 3
      and maxTransitions = 36. POM schema growth candidate: a loop_guard
      block on a state with named exhaustion exits per cycle.

    - |
      The retry budget is shared between parse_retry and coherence_retry
      (both consume MAX_LLM_ATTEMPTS). Modeled here as two distinct
      events but the same exhaustion threshold; the POM YAML doesn't
      express the shared budget.

    - |
      The step matrix in the source carries patches/state mutation
      (AnalyzerState grown additively across steps via patch + merge).
      The POM context_schema captures the boundary (input + per-terminal
      output) but not the intermediate state growth, which is intended
      under the "no shared global state" invariant of the composition
      model. The intermediate AnalyzerState lives in target code.
