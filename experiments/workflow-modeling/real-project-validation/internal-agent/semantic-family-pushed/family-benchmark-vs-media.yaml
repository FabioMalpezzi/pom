workflow: family_benchmark_vs_media
version: 1
description: |
  Benchmark vs media analytical family. Triggered on benchmark intent.
  Precedence rule: benchmark_vs_media_on_benchmark_intent (position 5).

context_schema:
  input:
    - { name: signals,        type: object }
    - { name: scope_context,  type: object }
    - { name: role_family,    type: string }
  output_by_terminal:
    matched:
      - { name: family_id,             type: string }
      - { name: analysis_type,         type: string }
      - { name: comparison_mode,       type: string }
      - { name: expected_answer_shape, type: string }
    not_matched:
      - { name: family_id,             type: string }
    needs_scope_clarification:
      - { name: family_id,             type: string }
    needs_semantic_clarification:
      - { name: family_id,             type: string }
      - { name: ambiguity_kind,        type: string }

initial_state: evaluating

states:
  - { name: evaluating,                   description: "Evaluating benchmark entry, scope, and ambiguity guards.", is_final: false }
  - { name: matched,                      description: "Benchmark family resolved.", is_final: true }
  - { name: not_matched,                  description: "Benchmark entry guards not satisfied.", is_final: true }
  - { name: needs_scope_clarification,    description: "scope_missing fired.", is_final: true }
  - { name: needs_semantic_clarification, description: "benchmark_target_ambiguous fired.", is_final: true }

events:
  - { name: entry_failed,         description: "Benchmark entry guards not satisfied." }
  - { name: scope_missing_signal, description: "scope_missing guard true." }
  - { name: semantic_ambiguity,   description: "benchmark_target_ambiguous fired." }
  - { name: ready,                description: "All ready guards true; family resolved." }

guards:
  - { name: benchmark_entry_guards,    description: "analysis_benchmark, internal_benchmark_requested." }
  - { name: scope_missing,             description: "Scope cannot be resolved." }
  - { name: benchmark_target_ambiguous, description: "Benchmark target not uniquely identifiable." }
  - { name: benchmark_ready_guards,    description: "All benchmark ready guards true." }

transitions:
  - { from: evaluating, to: not_matched,                  event: entry_failed,         guard: benchmark_entry_guards }
  - { from: evaluating, to: needs_scope_clarification,    event: scope_missing_signal, guard: scope_missing }
  - { from: evaluating, to: needs_semantic_clarification, event: semantic_ambiguity,   guard: benchmark_target_ambiguous }
  - { from: evaluating, to: matched,                      event: ready,                guard: benchmark_ready_guards }

metadata:
  source: pipeline-contract/family-state-rules.ts (benchmark_vs_media record)
  precedence_position: 5
