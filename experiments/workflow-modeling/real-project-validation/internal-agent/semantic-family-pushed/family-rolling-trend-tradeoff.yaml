workflow: family_rolling_trend_tradeoff
version: 1
description: |
  Rolling trend with tradeoff analytical family. Triggered on trend
  intent. Precedence rules: rolling_trend_tradeoff_on_trend_intent,
  rolling_trend_tradeoff_on_diagnosis_with_movement (position 4).

context_schema:
  input:
    - { name: signals,        type: object }
    - { name: scope_context,  type: object }
    - { name: role_family,    type: string }
  output_by_terminal:
    matched:
      - { name: family_id,             type: string }
      - { name: analysis_type,         type: string }
      - { name: comparison_mode,       type: string }
      - { name: expected_answer_shape, type: string }
    not_matched:
      - { name: family_id,             type: string }
    needs_scope_clarification:
      - { name: family_id,             type: string }
    needs_semantic_clarification:
      - { name: family_id,             type: string }
      - { name: ambiguity_kind,        type: string }

initial_state: evaluating

states:
  - { name: evaluating,                   description: "Evaluating trend entry, scope, and ambiguity guards.", is_final: false }
  - { name: matched,                      description: "Rolling-trend family resolved.", is_final: true }
  - { name: not_matched,                  description: "Trend entry guards not satisfied.", is_final: true }
  - { name: needs_scope_clarification,    description: "scope_missing fired.", is_final: true }
  - { name: needs_semantic_clarification, description: "tradeoff_drivers_ambiguous fired.", is_final: true }

events:
  - { name: entry_failed,         description: "Trend entry guards not satisfied." }
  - { name: scope_missing_signal, description: "scope_missing guard true." }
  - { name: semantic_ambiguity,   description: "tradeoff_drivers_ambiguous fired." }
  - { name: ready,                description: "All ready guards true; family resolved." }

guards:
  - { name: trend_entry_guards,           description: "analysis_trend, tradeoff_or_joint_movement_cue." }
  - { name: scope_missing,                description: "Scope cannot be resolved." }
  - { name: tradeoff_drivers_ambiguous,   description: "Tradeoff drivers not uniquely identifiable." }
  - { name: trend_ready_guards,           description: "All trend ready guards true." }

transitions:
  - { from: evaluating, to: not_matched,                  event: entry_failed,         guard: trend_entry_guards }
  - { from: evaluating, to: needs_scope_clarification,    event: scope_missing_signal, guard: scope_missing }
  - { from: evaluating, to: needs_semantic_clarification, event: semantic_ambiguity,   guard: tradeoff_drivers_ambiguous }
  - { from: evaluating, to: matched,                      event: ready,                guard: trend_ready_guards }

metadata:
  source: pipeline-contract/family-state-rules.ts (rolling_trend_tradeoff record)
  precedence_position: 4
