workflow: shipping_flow
version: 1
description: |
  Shipping lifecycle. Prepares, hands to carrier, in transit, delivered or
  lost. Returns are out of scope: a returned shipment becomes a new
  workflow instance.

context_schema:
  input:
    - { name: order_id,             type: string }
    - { name: shipping_address_id,  type: string }
  output_by_terminal:
    shipped:
      - { name: tracking_number, type: string }
      - { name: delivered_at,    type: string, description: "ISO-8601 instant." }
    lost:
      - { name: lost_reason,     type: string }
      - { name: last_known_at,   type: string }

initial_state: preparing

states:
  - name: preparing
    description: warehouse picking and packing
    is_final: false
  - name: handed_to_carrier
    description: package transferred to carrier
    is_final: false
  - name: in_transit
    description: carrier transporting the package
    is_final: false
  - name: shipped
    description: package delivered to recipient (terminal success)
    is_final: true
  - name: lost
    description: package declared lost by carrier (terminal failure)
    is_final: true

events:
  - name: hand_off
    description: package handed to carrier
  - name: depart
    description: package leaves origin facility
  - name: deliver
    description: package delivered
  - name: declare_lost
    description: carrier declares the package lost

transitions:
  - from: preparing
    to: handed_to_carrier
    event: hand_off
  - from: handed_to_carrier
    to: in_transit
    event: depart
  - from: in_transit
    to: shipped
    event: deliver
  - from: in_transit
    to: lost
    event: declare_lost

metadata:
  owner: fulfillment team
  tags: [example, real, pipeline-member]
