workflow: payment_validation
version: 1
description: |
  Child workflow that validates a payment request. Receives amount and
  method as input; returns a token + timestamp on success, or a refusal
  reason on failure. The Result<Terminal, Output> shape is declared
  explicitly via context_schema.

context_schema:
  input:
    - name: amount
      type: number
      description: Amount to validate, in cents.
    - name: method
      type: string
      description: Payment method tag (card, bank_transfer, wallet).

  output_by_terminal:
    validated:
      - name: validation_token
        type: string
        description: Opaque token granting the parent permission to capture.
      - name: timestamp
        type: string
        description: ISO-8601 instant at which validation completed.
    refused:
      - name: refusal_reason
        type: string
        description: Short machine-readable refusal code (e.g., insufficient_funds).

initial_state: ready
states:
  - name: ready
    description: child has its input and is ready to start
    is_final: false
  - name: validated
    description: validation succeeded
    is_final: true
  - name: refused
    description: validation failed
    is_final: true

events:
  - name: pass
    description: gateway accepted the payment
  - name: deny
    description: gateway refused the payment

transitions:
  - from: ready
    to: validated
    event: pass
  - from: ready
    to: refused
    event: deny
