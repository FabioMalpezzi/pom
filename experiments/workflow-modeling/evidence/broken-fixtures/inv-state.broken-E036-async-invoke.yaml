# Expected to trigger: E036 (state invoke with async mode).

workflow: broken_e036
version: 1
description: |
  Declares mode: async on a state invoke. Forbidden by design.

initial_state: idle
states:
  - name: idle
    description: starting point
    is_final: false
  - name: validating
    description: tries to invoke async
    is_final: false
    invoke:
      workflow: ../../examples/invoke-state-toy/state-invoke-child.yaml
      mode: async                              # forbidden
      on_completion:
        - terminal_state: validated
          next_event: passed
  - name: done
    description: terminal
    is_final: true

events:
  - name: start
    description: starts the parent
  - name: passed
    description: child returned

transitions:
  - from: idle
    to: validating
    event: start
  - from: validating
    to: done
    event: passed
