# Expected: E064 because on_exhaustion references no declared state.
workflow: loop_guard_missing_exhaustion_target
version: 1
initial_state: planning
states:
  - name: planning
    is_final: false
    loop_guard:
      max_visits: 3
      on_exhaustion: missing_state
events:
  - name: retry
transitions:
  - from: planning
    to: planning
    event: retry
