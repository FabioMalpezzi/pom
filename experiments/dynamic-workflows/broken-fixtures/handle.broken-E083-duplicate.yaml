workflow: dynamic_handle_duplicate
version: 1
initial_state: launch_a

states:
  - name: launch_a
    is_final: false
    fan_out_launch:
      workflow: 01-task-pipeline.yaml
      over: items_a
      handle: batch
  - name: launch_b
    is_final: false
    fan_out_launch:
      workflow: 01-task-pipeline.yaml
      over: items_b
      handle: batch
  - name: wait
    is_final: false
    await:
      handles: [batch]
      join: all
  - name: done
    is_final: true

events:
  - name: launched_a
  - name: launched_b
  - name: ready

transitions:
  - from: launch_a
    to: launch_b
    event: launched_a
  - from: launch_b
    to: wait
    event: launched_b
  - from: wait
    to: done
    event: ready
