workflow: dyn_parallel_probe
version: 1
description: |
  Broken fixture: native parallel mode inside a state invoke is rejected.
  Dynamic Workflow fan-out is modeled through the control-plane contract,
  not through `mode: parallel` inside the FSM.
initial_state: dispatching
states:
  - name: dispatching
    description: Attempts to launch a task through native parallel invoke.
    is_final: false
    invoke:
      workflow: ../workflows-candidate/01-task-pipeline.yaml
      mode: parallel
      on_completion:
        - terminal_state: task_done
          next_event: task_returned
  - name: aggregating
    is_final: false
  - name: all_done
    is_final: true
events:
  - name: task_returned
  - name: done_all
transitions:
  - from: dispatching
    to: aggregating
    event: task_returned
  - from: aggregating
    to: all_done
    event: done_all
metadata:
  expected_error: E036
